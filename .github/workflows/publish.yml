name: Publish to npm

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME}
          npm version $VERSION --no-git-tag-version
          for pkg in packages/*/; do
            (cd "$pkg" && npm version $VERSION --no-git-tag-version)
          done
          node utils/set-versions.js $VERSION
      - run: npm install --ignore-scripts
      - run: npm run build
      - run: npm publish --access public --provenance
        working-directory: packages/protocol
      - run: npm publish --access public --provenance
        working-directory: packages/mobilewright-core
      - run: npm publish --access public --provenance
        working-directory: packages/driver-mobilecli
      - run: npm publish --access public --provenance
        working-directory: packages/mobilewright
      - run: npm publish --access public --provenance
        working-directory: packages/test
